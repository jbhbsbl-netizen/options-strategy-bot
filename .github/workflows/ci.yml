name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install -r requirements.txt

    - name: Run tests
      env:
        # Set dummy API keys for testing (tests shouldn't need real keys)
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test' }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'test-key' }}
      run: |
        pytest tests/ -v --tb=short

    - name: Generate coverage report
      if: matrix.python-version == '3.11'
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=term

    - name: Upload coverage to codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Check code formatting with black
      run: |
        black --check --diff src/ tests/ || true

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff src/ tests/ || true

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

  deploy-check:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify app can be imported
      run: |
        python -c "import streamlit; print('Streamlit version:', streamlit.__version__)"
        python -c "import sys; sys.path.insert(0, 'src'); from data.yfinance_client import YFinanceClient; print('Core imports successful')"

    - name: Check for main app file
      run: |
        if [ -f "app_professional.py" ]; then
          echo "✓ Main app file found"
        else
          echo "✗ Main app file not found"
          exit 1
        fi

    - name: Deployment ready
      run: |
        echo "🚀 Application is ready for deployment!"
        echo "To deploy to Streamlit Cloud:"
        echo "1. Push this code to GitHub"
        echo "2. Go to share.streamlit.io"
        echo "3. Connect your GitHub repo"
        echo "4. Select app_professional.py as the main file"
